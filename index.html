<!DOCTYPE HTML>
<html lang=en-US>
<meta http-equiv="content-type" content="text/html;charset=UTF-8" />

<head>
    <meta charset=UTF-8>
    <meta name=robots content="noindex, nofollow" />
    <title>Nur zum FICKEN!</title>
    <meta name=viewport content="user-scalable=false, initial-scale=1.0, maximum-scale=1.0">
    <link href="img/favicon.png" rel="shortcut icon" type="image/x-icon" />
    <meta content name=keywords>
    <meta content name=description>
    <link rel="stylesheet" type="text/css" href=css/style.css>
    <script type="text/javascript" src="js/jquery.js"></script>
    <script type="text/javascript" src="js/script.js"></script>

    </head> 
<body style>
    <div class="wrap">
        <div class="step-block">
            <div class="step-item step-1 preload visible first-step">
                <div class="step-inner">
                    <div class="container">
                        <div class="step-header"> 
                          Sind Sie über 18 Jahre alt?
                        </div>
                         
                        <div class="buttons-block">
                            
                            <div class="step-btn tr-next-button btn-no"> Nein </div>
                            <div class="step-btn tr-next-button btn-yes"> Ja </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="step-item step-2 preload">
                <div class="step-inner">
                    <div class="container">
                        <div class="step-header"> 
                          Wen möchten Sie kennenlernen?
                        </div>
                         <div class="buttons-block">
                            <div class="step-btn yes-btn tr-next-button tr-b-option btn-no"> Männer </div>
                             <div class="step-btn yes-btn tr-next-button tr-b-option btn-yes"> Frauen </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="step-item step-3">
                <div class="step-inner">
                    <div class="container">
                         <div class="email-box">
                             <h1>Jetzt E-Mail eingeben und sofort chatten</h1>
                            <form id="emailForm">
                               <input type="email" name="email" id="email" placeholder="Geben Sie Ihre Email Adresse ein" required>
                               <button type="submit" id="submitBtn">Weiter</button>
                               <div id="message"></div>
                           </form>
                       </div>
                    </div>
                </div>
            </div>
            
        </div>
        <div class="slider-block">
            <div class="slider-item item-1 active preload"> </div>
            <div class="slider-item item-2 preload"> </div>
            <div class="slider-item item-3"> </div>
            <div class="slider-item item-4"> </div>
        </div>
    </div>
    <script>
        function init() {
            setTimeout(function() {
                window.scrollTo(0, 1)
            }, 0);
        }
        window.history.pushState('back.html', 'back', 'back.html');
        window.history.pushState('index.html', 'Index', 'index.html');
        window.addEventListener('popstate', function(e) {
            if (document.URL.indexOf('back.html') >= 0) {
                document.location.href = document.location;
            }
        });
    </script>
   <script>
document.getElementById("emailForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let email = document.getElementById("email").value;
    let messageBox = document.getElementById("message");
    let submitBtn = document.getElementById("submitBtn");

    submitBtn.disabled = true;
    submitBtn.innerText = "Submitting...";
    messageBox.innerHTML = "";

    fetch("submit-email.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "email=" + encodeURIComponent(email)
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === "success") {
            messageBox.style.color = "green";
            messageBox.innerHTML = data.message;

            document.getElementById("emailForm").reset();

            setTimeout(function() {
                window.location.href = "listing/index.html";
            }, 1000);

        } else {
            messageBox.style.color = "red";
            messageBox.innerHTML = data.message;
        }

        submitBtn.disabled = false;
        submitBtn.innerText = "Submit";
    })
    .catch(error => {
        messageBox.style.color = "red";
        messageBox.innerHTML = "Something went wrong. Please try again.";

        submitBtn.disabled = false;
        submitBtn.innerText = "Submit";
    });
});
</script>
    </body>
    </html>
